services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-}
    env_file:
      - .env
    # ports:
    #   - "3000:3000"
    restart: unless-stopped
    networks:
      tcg_net:
        ipv4_address: 10.11.12.10

networks:
  tcg_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.11.12.0/24
